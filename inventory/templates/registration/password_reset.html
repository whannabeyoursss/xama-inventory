<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - XAMA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #0C447C 0%, #185FA5 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 420px; padding: 44px 40px; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 { font-size: 32px; font-weight: 700; color: #0C447C; }
        .logo p { font-size: 12px; color: #6B7280; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
        .subtitle { font-size: 14px; color: #6B7280; text-align: center; margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 7px; }
        .form-control { width: 100%; padding: 12px 16px; border: 0.5px solid #D1D5DB; border-radius: 10px; font-size: 15px; color: #1A1A1A; }
        .form-control:focus { outline: none; border-color: #0C447C; box-shadow: 0 0 0 3px rgba(12,68,124,0.1); }
        .btn-login { width: 100%; padding: 13px; background: #0C447C; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
        .btn-login:hover { background: #185FA5; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { font-size: 13px; color: #0C447C; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>XAMA</h1>
            <p>Consumer Goods Trading</p>
        </div>
        <p class="subtitle">Enter your email and we'll send you a reset link.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-login">Send Reset Link</button>
        </form>
        <div class="back-link">
            <a href="{% url 'login' %}">← Back to Login</a>
        </div>
    </div>
</body>
</html>
