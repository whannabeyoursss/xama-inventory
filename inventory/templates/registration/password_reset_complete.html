<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Changed - XAMA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #0C447C 0%, #185FA5 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 420px; padding: 44px 40px; text-align: center; }
        .logo h1 { font-size: 32px; font-weight: 700; color: #0C447C; }
        .logo p { font-size: 12px; color: #6B7280; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
        .icon { font-size: 48px; margin: 24px 0 16px; }
        h2 { font-size: 20px; font-weight: 600; color: #1A1A1A; margin-bottom: 12px; }
        p { font-size: 14px; color: #6B7280; margin-bottom: 24px; }
        .btn-login { display: block; width: 100%; padding: 13px; background: #0C447C; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; }
        .btn-login:hover { background: #185FA5; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>XAMA</h1>
            <p>Consumer Goods Trading</p>
        </div>
        <div class="icon">✅</div>
        <h2>Password Changed!</h2>
        <p>Your password has been updated successfully. You can now login with your new password.</p>
        <a href="{% url 'login' %}" class="btn-login">Login Now</a>
    </div>
</body>
</html>
