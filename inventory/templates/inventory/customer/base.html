<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}XAMA Shop{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F8F9FA; color: #1A1A1A; }
        .topnav { background: #0C447C; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
        .topnav-logo { color: #fff; font-size: 18px; font-weight: 700; text-decoration: none; letter-spacing: 0.02em; }
        .topnav-logo span { font-size: 11px; font-weight: 400; color: rgba(255,255,255,0.6); margin-left: 8px; }
        .topnav-links { display: flex; align-items: center; gap: 4px; }
        .topnav-links a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 13px; padding: 7px 14px; border-radius: 8px; transition: all 0.15s; }
        .topnav-links a:hover, .topnav-links a.active { background: rgba(255,255,255,0.14); color: #fff; }
        .topnav-right { display: flex; align-items: center; gap: 12px; }
        .user-chip { display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.85); font-size: 13px; }
        .avatar { width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.2); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; }
        .logout-btn { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 12px; padding: 5px 10px; border: 0.5px solid rgba(255,255,255,0.2); border-radius: 6px; }
        .logout-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .content { padding: 28px; max-width: 1200px; margin: 0 auto; }
        .page-header { margin-bottom: 24px; }
        .page-header h1 { font-size: 22px; font-weight: 600; }
        .page-header p { color: #6B7280; font-size: 14px; margin-top: 4px; }
        .btn { display: inline-block; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; text-decoration: none; transition: all 0.15s; }
        .btn-primary { background: #0C447C; color: #fff; }
        .btn-primary:hover { background: #185FA5; }
        .btn-secondary { background: #F3F4F6; color: #374151; border: 0.5px solid #D1D5DB; }
        .btn-secondary:hover { background: #E5E7EB; }
        .btn-sm { padding: 6px 14px; font-size: 12px; }
        .card { background: #fff; border-radius: 12px; border: 0.5px solid #E5E7EB; overflow: hidden; margin-bottom: 20px; }
        .card-header { padding: 14px 20px; border-bottom: 0.5px solid #E5E7EB; display: flex; align-items: center; justify-content: space-between; }
        .card-header h3 { font-size: 14px; font-weight: 600; }
        .card-body { padding: 20px; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
        .badge-success { background: #D1FAE5; color: #065F46; }
        .badge-warning { background: #FEF3C7; color: #92400E; }
        .badge-danger { background: #FEE2E2; color: #991B1B; }
        .badge-info { background: #DBEAFE; color: #1E40AF; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 11px 16px; font-size: 11px; font-weight: 600; color: #6B7280; background: #F9FAFB; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 0.5px solid #E5E7EB; }
        td { padding: 13px 16px; border-bottom: 0.5px solid #F3F4F6; }
        tr:last-child td { border-bottom: none; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
        .form-control { width: 100%; padding: 10px 14px; border: 0.5px solid #D1D5DB; border-radius: 8px; font-size: 14px; }
        .form-control:focus { outline: none; border-color: #0C447C; box-shadow: 0 0 0 3px rgba(12,68,124,0.08); }
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 14px; font-size: 13px; }
        .alert-success { background: #D1FAE5; color: #065F46; }
        .alert-error { background: #FEE2E2; color: #991B1B; }
        .empty-state { text-align: center; padding: 50px; color: #9CA3AF; }
        .empty-state-icon { font-size: 40px; margin-bottom: 12px; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
<nav class="topnav">
    <a href="{% url 'customer_dashboard' %}" class="topnav-logo">XAMA <span>Consumer Goods</span></a>
    <div class="topnav-links">
        <a href="{% url 'customer_dashboard' %}" class="{% if request.resolver_match.url_name == 'customer_dashboard' %}active{% endif %}">Home</a>
        <a href="{% url 'customer_product_browse' %}" class="{% if request.resolver_match.url_name == 'customer_product_browse' %}active{% endif %}">Products</a>
        <a href="{% url 'customer_place_order' %}" class="{% if request.resolver_match.url_name == 'customer_place_order' %}active{% endif %}">Place Order</a>
        <a href="{% url 'customer_my_orders' %}" class="{% if request.resolver_match.url_name == 'customer_my_orders' %}active{% endif %}">My Orders</a>
    </div>
    <div class="topnav-right">
        <div class="user-chip">
            <div class="avatar">{{ user.username.0|upper }}</div>
            <span>{{ user.username }}</span>
        </div>
        <form method="post" action="{% url 'logout' %}" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="logout-btn" style="background:none;border:none;cursor:pointer;">Logout</button>
        </form>
    </div>
</nav>

<div class="content">
    {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
</div>
{% block extra_js %}{% endblock %}
</body>
</html>
