<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - XAMA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0C447C 0%, #185FA5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 460px;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo h1 {
            font-size: 30px;
            font-weight: 700;
            color: #0C447C;
        }

        .logo p {
            font-size: 12px;
            color: #6B7280;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .logo .subtitle {
            font-size: 15px;
            color: #374151;
            margin-top: 10px;
            font-weight: 500;
            text-transform: none;
            letter-spacing: 0;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            padding: 11px 14px;
            border: 0.5px solid #D1D5DB;
            border-radius: 8px;
            font-size: 14px;
            color: #1A1A1A;
            transition: all 0.15s;
            background: #fff;
        }

        .form-control:focus {
            outline: none;
            border-color: #0C447C;
            box-shadow: 0 0 0 3px rgba(12, 68, 124, 0.1);
        }

        .btn-signup {
            width: 100%;
            padding: 13px;
            background: #0C447C;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            margin-top: 6px;
        }

        .btn-signup:hover {
            background: #185FA5;
            transform: translateY(-1px);
        }

        .errors {
            background: #FEE2E2;
            border: 0.5px solid #FCA5A5;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
        }

        .errors p {
            color: #991B1B;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .errors p:last-child {
            margin-bottom: 0;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 0.5px;
            background: #E5E7EB;
        }

        .divider span {
            background: #fff;
            padding: 0 12px;
            font-size: 12px;
            color: #9CA3AF;
            position: relative;
        }

        .signin-link {
            text-align: center;
            font-size: 13px;
            color: #6B7280;
        }

        .signin-link a {
            color: #0C447C;
            text-decoration: none;
            font-weight: 600;
        }

        .signin-link a:hover {
            text-decoration: underline;
        }

        .role-note {
            background: #EFF6FF;
            border: 0.5px solid #BFDBFE;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: #1E40AF;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>XAMA</h1>
            <p>Consumer Goods Trading</p>
            <div class="subtitle">Create your account</div>
        </div>

        {% if errors %}
        <div class="errors">
            {% for error in errors %}
                <p>⚠ {{ error }}</p>
            {% endfor %}
        </div>
        {% endif %}

        <div class="role-note">
            🛒 New accounts are registered as <strong>Customer</strong>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" class="form-control"
                           value="{{ first_name|default:'' }}" placeholder="Juan">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name" class="form-control"
                           value="{{ last_name|default:'' }}" placeholder="Dela Cruz">
                </div>
            </div>

            <div class="form-group">
                <label>Username *</label>
                <input type="text" name="username" class="form-control" required
                       value="{{ username|default:'' }}" placeholder="Choose a username">
            </div>

            <div class="form-group">
                <label>Email Address *</label>
                <input type="email" name="email" class="form-control" required
                       value="{{ email|default:'' }}" placeholder="juan@email.com">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" name="password1" class="form-control"
                           required placeholder="Min. 8 characters">
                </div>
                <div class="form-group">
                    <label>Confirm Password *</label>
                    <input type="password" name="password2" class="form-control"
                           required placeholder="Repeat password">
                </div>
            </div>

            <button type="submit" class="btn-signup">Create Account</button>
        </form>

        <div class="divider"><span>already have an account?</span></div>

        <div class="signin-link">
            <a href="{% url 'login' %}">Sign In instead →</a>
        </div>
    </div>
</body>
</html>
